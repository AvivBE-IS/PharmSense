<div class="absolute inset-0 bg-gradient-to-t from-primary/80 via-primary/20 to-transparent flex flex-col justify-end p-12">
<h1 class="font-h1 text-h1 text-on-primary mb-4" style="">Empathetic Care,<br>Clinical Precision.</h1>
<p class="font-body-lg text-body-lg text-inverse-primary max-w-md" style="">with pharmsense your health managed with efficiency and trust in a modern digital environment.</p>
</div>
</div>
<div class="w-full md:w-1/2 flex items-center justify-center p-6 sm:p-12 bg-background relative z-0">
<div class="absolute top-8 left-8 flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container text-3xl" data-weight="fill" style="font-variation-settings: &quot;FILL&quot; 1;">medical_services</span>
<span class="font-h3 text-h3 text-primary-container tracking-tight" style="">PharmSense</span>
</div>
<div class="w-full max-w-md bg-surface-container-lowest rounded-[24px] p-8 sm:p-10 ambient-shadow border border-outline-variant/30">
<div class="mb-10 text-center">
<h2 class="font-h2 text-h2 text-on-surface mb-2" style="">WELCOME</h2>
<p class="font-body-md text-body-md text-on-surface-variant" style="">Log in to manage your prescriptions.</p>
</div>
<form class="space-y-6">
<div class="relative">
<label class="font-label-bold text-label-bold text-on-surface-variant block mb-2 uppercase" for="email" style="">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" style="">mail</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface rounded-[16px] border border-outline-variant focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 text-on-surface font-body-md text-body-md transition-all outline-none" id="email" placeholder="patient@example.com" type="email">
</div>
</div>
<div class="relative">
<div class="flex justify-between items-center mb-2">
<label class="font-label-bold text-label-bold text-on-surface-variant uppercase" for="password" style="">Password</label>
<a class="font-body-sm text-body-sm text-primary-container hover:underline transition-all" href="#" style="">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" style="">lock</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface rounded-[16px] border border-outline-variant focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 text-on-surface font-body-md text-body-md transition-all outline-none" id="password" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button" style="">
<span class="material-symbols-outlined" style="">visibility_off</span>
</button>
</div>
</div>
<div class="pt-4">
<button class="w-full h-[56px] bg-primary-container text-on-primary font-button text-button rounded-[24px] shadow-sm hover:-translate-y-0.5 hover:shadow-md transition-all duration-200 flex items-center justify-center gap-2 bg-gradient-to-r from-primary-container to-[#006e6e]" type="button" style="">
<span class="" style="">Login</span>
<span class="material-symbols-outlined text-sm" style="">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-container-lowest text-on-surface-variant font-body-sm text-body-sm" style="">Or</span>
</div>
</div>
<div class="mt-6">
<button class="w-full h-[56px] bg-surface rounded-[24px] border border-outline-variant text-on-surface font-button text-button hover:bg-surface-dim transition-colors flex items-center justify-center gap-3" type="button" style="">
<span class="material-symbols-outlined text-primary-container" data-weight="fill" style="font-variation-settings: &quot;FILL&quot; 1;">fingerprint</span>
<span class="" style="">Login with Bio-ID</span>
</button>
</div>
</div>
<p class="mt-8 text-center font-body-sm text-body-sm text-on-surface-variant" style="">

</p>
