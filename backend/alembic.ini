# A generic, single database configuration.
# This file is ready for use with Alembic migrations.
# Run `alembic init alembic` inside the backend/ directory to scaffold
# the migrations folder, then configure `sqlalchemy.url` below.

[alembic]
# Path to migration scripts
script_location = alembic

# Leave this as-is; actual URL is read from settings in env.py
# sqlalchemy.url = configured in alembic/env.py via app.config.settings

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
