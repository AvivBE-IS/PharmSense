services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data_context:/app/data_context:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    env_file: ./frontend/.env
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
